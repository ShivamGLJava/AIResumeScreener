spring.application.name=resumescreener

# PostgreSQL - Set via environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/resumescreener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hugging Face API Key - Set via environment variable HF_API_KEY
huggingface.api.key=${HF_API_KEY:}
